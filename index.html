<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>citygen</title>
  <style>
    :root {
      --bg: #17171c;
      --panel: #1f1f26;
      --panel2: #26262e;
      --border: #33333e;
      --text: #c9c9d4;
      --text-dim: #808090;
      --accent: #b44cff;
      --accent2: #4cc9ff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", Menlo, monospace;
      font-size: 11px;
      overflow: hidden;
      user-select: none;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ヘッダー */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 34px;
      padding: 0 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex: none;
    }
    header .logo { color: var(--accent); font-weight: 700; letter-spacing: 2px; font-size: 12px; }
    header #status { color: var(--text-dim); }

    #main { display: flex; flex: 1; min-height: 0; }

    /* プレビュー（コンポジションパネル） */
    #preview {
      flex: 1;
      min-width: 0;
      background: #0d0d10;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #comp-wrap {
      position: relative;
      box-shadow: 0 0 0 1px #000, 0 8px 40px #000a;
      background: #000;
    }
    #comp-wrap canvas { display: block; width: 100%; height: 100%; }
    #comp-wrap #overlay-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: none;
    }
    #preview .comp-info {
      position: absolute;
      left: 10px;
      bottom: 8px;
      color: var(--text-dim);
      pointer-events: none;
    }

    /* トグルスイッチ */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .toggle-row label { color: var(--text-dim); }
    .switch { position: relative; width: 34px; height: 18px; flex: none; }
    .switch input { opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
    .switch .track {
      position: absolute; inset: 0; background: #3a3a46; border-radius: 9px;
      transition: background 0.15s; pointer-events: none;
    }
    .switch .track::after {
      content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
      background: #c9c9d4; border-radius: 50%; transition: transform 0.15s;
    }
    .switch input:checked ~ .track { background: var(--accent2); }
    .switch input:checked ~ .track::after { transform: translateX(16px); background: #fff; }

    /* パラメータドック */
    #dock {
      width: 300px;
      flex: none;
      background: var(--panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #dock::-webkit-scrollbar { width: 8px; }
    #dock::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    details.group { border-bottom: 1px solid var(--border); }
    details.group > summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 12px;
      background: var(--panel2);
      color: var(--text);
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.group > summary::before { content: "▸"; color: var(--text-dim); font-size: 9px; }
    details.group[open] > summary::before { content: "▾"; }
    .group-body { padding: 8px 12px 10px; }

    /* フェーダー行 */
    .fader { display: grid; grid-template-columns: 88px 1fr 52px; align-items: center; gap: 8px; margin-bottom: 7px; }
    .fader label { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fader input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 16px;
      background: transparent;
      margin: 0;
      cursor: ew-resize;
    }
    .fader input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      background: #3a3a46;
      border-radius: 2px;
    }
    .fader input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent2);
      margin-top: -3.5px;
      box-shadow: 0 0 4px #4cc9ff88;
    }
    .fader input[type="number"] {
      width: 100%;
      background: #141419;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 4px;
      font: inherit;
      text-align: right;
    }
    .fader input[type="number"]::-webkit-inner-spin-button { display: none; }

    /* Export グループ */
    .row { display: grid; grid-template-columns: 88px 1fr; align-items: center; gap: 8px; margin-bottom: 7px; }
    .row label { color: var(--text-dim); }
    .row select {
      background: #141419;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 4px;
      font: inherit;
    }
    #export {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 4px;
      font: inherit;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #export:disabled { opacity: 0.5; cursor: wait; }
    #progress {
      margin-top: 8px;
      height: 3px;
      background: #141419;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    #progress.active { display: block; }
    #progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="logo">CITYGEN</span>
      <span id="status"></span>
    </header>
    <div id="main">
      <div id="preview">
        <div id="comp-wrap">
          <canvas id="view"></canvas>
          <img id="overlay-img" src="/overlay.png" alt="" />
        </div>
        <div class="comp-info" id="comp-info"></div>
      </div>
      <aside id="dock">
        <div id="param-groups"></div>
        <details class="group" open>
          <summary>Overlay</summary>
          <div class="group-body">
            <div class="toggle-row">
              <label for="overlay-enable">Enabled</label>
              <span class="switch">
                <input type="checkbox" id="overlay-enable" />
                <span class="track"></span>
              </span>
            </div>
            <div class="fader">
              <label>Opacity</label>
              <input type="range" id="overlay-opacity" min="0" max="1" step="0.01" value="0.5" />
              <input type="number" id="overlay-opacity-num" min="0" max="1" step="0.01" value="0.5" />
            </div>
          </div>
        </details>
        <details class="group" open>
          <summary>Export</summary>
          <div class="group-body">
            <div class="row">
              <label for="resolution">Resolution</label>
              <select id="resolution">
                <option value="1280x720">1280×720</option>
                <option value="1920x1080" selected>1920×1080</option>
                <option value="2560x1440">2560×1440</option>
                <option value="3840x2160">3840×2160 (4K)</option>
              </select>
            </div>
            <div class="row">
              <label for="fps">FPS</label>
              <select id="fps">
                <option value="24">24</option>
                <option value="30">30</option>
                <option value="60" selected>60</option>
              </select>
            </div>
            <div id="export-faders"></div>
            <button id="export">EXPORT MP4</button>
            <div id="progress"><div></div></div>
          </div>
        </details>
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
